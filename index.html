<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>ZenBreath</title>
    <style>
        :root {
            --bg: #000000;
            --fg: #FFFFFF;
            --success: #66BB6A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            height: 100dvh;
            background-color: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .screen.active {
            opacity: 1;
            pointer-events: all;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 200;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        h2 {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        .intention-text {
            font-size: 1.1rem;
            font-weight: 300;
            font-style: italic;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 3rem;
            text-align: center;
            max-width: 85%;
            min-height: 3rem;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .btn {
            background: var(--fg);
            color: var(--bg);
            border: none;
            border-radius: 4rem;
            padding: 1.2rem 3rem;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
            margin-top: auto;
            margin-bottom: 15vh;
        }

        .btn:hover {
            background: #222222;
            /* Dark grey */
            color: var(--fg);
            /* White text */
        }

        .btn:active {
            transform: scale(0.9);
            /* Makes the button reduce in size when clicked */
        }

        /* Buttery 3D Scroll Picker */
        .picker-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 50vh;
            margin: 2rem 0;
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 40%, black 60%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 40%, black 60%, transparent 100%);
        }

        .picker {
            position: relative;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            padding-top: calc(25vh - 70px);
            padding-bottom: calc(25vh - 70px);
            perspective: 1000px;
            transform-style: preserve-3d;
        }

        .picker::-webkit-scrollbar {
            display: none;
        }

        .picker li {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.5rem;
            font-weight: 400;
            color: var(--fg);
            scroll-snap-align: center;
            will-change: transform, opacity;
        }

        .picker-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60%;
            height: 140px;
            pointer-events: all;
            cursor: pointer;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 1.5rem;
            border-radius: 0.5rem;
            transition: background 0.2s;
        }

        .picker-overlay:active {
            background: rgba(255, 255, 255, 0.06);
        }

        /* Container scales rapidly (GPU Accelerated Breathing) */
        .circle {
            width: clamp(250px, 70vw, 500px);
            height: clamp(250px, 70vw, 500px);
            border-radius: 50%;
            background: var(--fg);
            will-change: transform;
            transform: scale(0.4);
            /* Start small for inhale */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes breatheCycle {
            0% {
                transform: scale(0.4);
            }

            /* Start & Hold Low */
            37.5% {
                transform: scale(1);
            }

            /* Inhale (4.5s) */
            50% {
                transform: scale(1);
            }

            /* Hold (1.5s) */
            87.5% {
                transform: scale(0.4);
            }

            /* Exhale (4.5s) */
            100% {
                transform: scale(0.4);
            }

            /* Hold (1.5s) */
        }

        .animate-breathe {
            animation: breatheCycle 12s infinite linear;
        }

        .breathe-text {
            position: absolute;
            z-index: 10;
            font-size: 2.5rem;
            font-weight: 300;
            color: var(--fg);
            mix-blend-mode: difference;
            transition: opacity 1.5s;
        }

        .check-svg {
            position: absolute;
            width: 40%;
            height: 40%;
            opacity: 0;
            transition: 0.5s 0.8s;
            z-index: 2;
        }

        .check-svg.active {
            opacity: 1;
        }

        .check-path {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
        }

        .check-svg.active .check-path {
            animation: drawCheck 0.6s 1s forwards ease;
        }

        @keyframes drawCheck {
            to {
                stroke-dashoffset: 0;
            }
        }

        .s4-ui {
            position: absolute;
            top: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 15vh 0 10vh 0;
            opacity: 0;
            pointer-events: none;
            transition: 0.8s 0.5s;
        }

        .s4-ui.active {
            opacity: 1;
            pointer-events: all;
        }

        /* --- Quotes Button (top-left, all screens) --- */
        .quotes-btn {
            position: fixed;
            top: max(env(safe-area-inset-top, 12px), 12px);
            left: 16px;
            z-index: 100;
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.2s;
            display: flex;
            align-items: center;
        }

        .quotes-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.35);
            color: #fff;
        }

        .quotes-btn:active {
            transform: scale(0.92);
        }

        /* --- Quotes Screen --- */
        .quotes-screen {
            overflow-y: auto;
            justify-content: flex-start;
            padding: 6vh 1.5rem 4vh;
            z-index: 200;
            /* Fully obscure underlying screens */
            background-color: var(--bg);
            /* Smooth momentum scroll on iOS/older WebKit */
            -webkit-overflow-scrolling: touch;
            /* Prevent scroll chaining / pull-to-refresh interfering on mobile */
            overscroll-behavior-y: contain;
            /* Crisp text antialiasing on macOS/Chrome */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .quotes-feed {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 1.4rem;
            padding: 2vh 0 6vh;
        }

        .quotes-feed-item {
            font-size: clamp(1rem, 3.5vw, 1.2rem);
            font-weight: 300;
            font-style: italic;
            color: rgba(255, 255, 255, 0.75);
            line-height: 1.65;
            text-align: center;
            padding: 1rem 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            opacity: 0;
            /* Opacity-only fade-in: no transform → no compositor layer promotion,
               so subpixel font antialiasing stays sharp during and after scroll. */
            animation: quoteFadeIn 0.5s ease forwards;
        }

        .quotes-feed-item:last-child {
            border-bottom: none;
        }

        @keyframes quoteFadeIn {
            to {
                opacity: 1;
            }
        }

        /* --- Streak Button (top-right, all screens) --- */
        .streak-btn {
            position: fixed;
            top: max(env(safe-area-inset-top, 12px), 12px);
            right: 16px;
            z-index: 100;
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.2s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .streak-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.35);
            color: #fff;
        }

        .streak-btn:active {
            transform: scale(0.92);
        }

        .streak-btn svg {
            width: 16px;
            height: 16px;
        }

        /* --- Streak Screen --- */
        .streak-screen {
            overflow-y: auto;
            justify-content: flex-start;
            padding: 6vh 1.5rem 4vh;
            z-index: 200;
            /* Fully obscure underlying screens */
            background-color: var(--bg);
        }

        .streak-back {
            position: absolute;
            top: max(env(safe-area-inset-top, 12px), 12px);
            left: 16px;
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, transform 0.2s;
            z-index: 10;
        }

        .streak-back:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .streak-back:active {
            transform: scale(0.92);
        }

        .streak-quote {
            font-size: clamp(1.1rem, 4vw, 1.5rem);
            font-weight: 300;
            font-style: italic;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            max-width: 85%;
            margin: 5vh 0 3vh;
            line-height: 1.6;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .streak-quote.show {
            opacity: 1;
        }

        .streak-counter {
            text-align: center;
            margin: 2rem 0 1rem;
        }

        .streak-number {
            font-size: clamp(4rem, 15vw, 7rem);
            font-weight: 200;
            letter-spacing: -0.02em;
            line-height: 1;
            background: linear-gradient(135deg, #66BB6A, #81C784);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .streak-label {
            font-size: 1rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.45);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-top: 0.3rem;
        }

        /* --- Bar Chart --- */
        .chart-section {
            width: 100%;
            max-width: 500px;
            margin: 3rem auto 2rem;
            overflow-x: auto;
            /* Allow sideways scrolling on tiny phones if needed */
        }

        .chart-title {
            font-size: 0.85rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 1.2rem;
        }

        .chart-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 4px;
            height: 160px;
            padding: 0 0.5rem;
            min-width: 320px;
            /* Prevent over-squishing on small widths */
        }

        .chart-bar-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            max-width: 36px;
        }

        .chart-bar {
            width: 100%;
            min-height: 3px;
            border-radius: 3px 3px 0 0;
            background: linear-gradient(180deg, #66BB6A, #388E3C);
            transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .chart-bar.empty {
            background: rgba(255, 255, 255, 0.06);
            min-height: 3px;
        }

        .chart-bar.today {
            background: linear-gradient(180deg, #81C784, #66BB6A);
            box-shadow: 0 0 8px rgba(102, 187, 106, 0.4);
        }

        .chart-day {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 6px;
            font-weight: 400;
        }

        .chart-day.today {
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
        }

        .chart-mins {
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 4px;
            min-height: 0.9rem;
        }

        /* ===== TABLET / IPAD (max-width: 1024px) ===== */
        @media screen and (max-width: 1024px) and (orientation: portrait) {
            h1 {
                font-size: clamp(3rem, 10vw, 4rem);
            }

            h2 {
                font-size: clamp(2rem, 7vw, 3rem);
            }

            .intention-text {
                font-size: 1.3rem;
                max-width: 90%;
            }

            .picker-wrapper {
                height: 45vh;
            }

            .circle {
                width: clamp(300px, 75vw, 450px);
                height: clamp(300px, 75vw, 450px);
            }
        }

        /* iPad Landscape / Small Laptops (max-height: 850px) */
        @media screen and (max-width: 1024px) and (orientation: landscape) and (max-height: 850px) {
            .btn {
                margin-bottom: 5vh;
            }

            .intention-text {
                margin-bottom: 1.5rem;
            }

            .picker-wrapper {
                height: 35vh;
                margin: 1rem 0;
            }

            .circle {
                width: clamp(200px, 60vh, 350px);
                height: clamp(200px, 60vh, 350px);
            }
        }

        /* ===== MOBILE ONLY (phones) ===== */
        /* Desktop remain completely untouched */
        @media screen and (max-width: 600px) {

            /* General mobile portrait adjustments covering Samsungs, Pixels, iPhones */
            h1 {
                font-size: clamp(2rem, 10vw, 3rem);
                margin-bottom: 0.8rem;
            }

            h2 {
                font-size: clamp(1.3rem, 6vw, 2rem);
            }

            .intention-text {
                font-size: 1rem;
                max-width: 92%;
                margin-bottom: 2rem;
                min-height: 2.5rem;
            }

            /* Bigger tap targets for buttons */
            .btn {
                padding: 1.1rem 2.4rem;
                font-size: 1.1rem;
                margin-bottom: 8vh;
                min-height: 52px;
            }

            /* Picker adjustments */
            .picker-wrapper {
                height: 45vh;
                margin: 1.2rem 0;
            }

            .picker {
                padding-top: calc(22.5vh - 55px);
                padding-bottom: calc(22.5vh - 55px);
            }

            .picker li {
                height: 110px;
                font-size: 3.5rem;
            }

            .picker-overlay {
                width: 70%;
                height: 110px;
                padding-right: 1rem;
            }

            /* Breathing circle */
            .circle {
                width: clamp(220px, 75vw, 350px);
                height: clamp(220px, 75vw, 350px);
            }

            .breathe-text {
                font-size: 2rem;
            }

            /* Session complete UI */
            .s4-ui {
                padding: 12vh 0 8vh 0;
            }

            /* Quotes button */
            .quotes-btn {
                top: max(env(safe-area-inset-top, 8px), 8px);
                left: 12px;
                padding: 0.45rem 0.8rem;
                font-size: 0.8rem;
            }

            /* Streak button */
            .streak-btn {
                top: max(env(safe-area-inset-top, 8px), 8px);
                right: 12px;
                padding: 0.45rem 0.8rem;
                font-size: 0.8rem;
            }

            .streak-btn svg {
                width: 14px;
                height: 14px;
            }

            /* Streak screen */
            .streak-screen {
                padding: 5vh 1rem 3vh;
            }

            .streak-back {
                top: max(env(safe-area-inset-top, 8px), 8px);
                left: 12px;
                padding: 0.45rem 0.8rem;
                font-size: 0.8rem;
            }

            .streak-quote {
                font-size: clamp(1rem, 4.5vw, 1.3rem);
                max-width: 92%;
                margin: 4vh 0 2vh;
                line-height: 1.5;
            }

            .streak-number {
                font-size: clamp(3.5rem, 18vw, 5.5rem);
            }

            .streak-label {
                font-size: 0.85rem;
                letter-spacing: 0.12em;
            }

            /* Chart adjustments */
            .chart-section {
                margin: 2rem auto 1.5rem;
            }

            .chart-title {
                font-size: 0.75rem;
                margin-bottom: 1rem;
            }

            .chart-container {
                height: 130px;
                gap: 3px;
                padding: 0 0.3rem;
            }

            .chart-bar-wrap {
                max-width: 28px;
            }

            .chart-day {
                font-size: 0.55rem;
                margin-top: 4px;
            }

            .chart-mins {
                font-size: 0.5rem;
                min-height: 0.75rem;
            }
        }

        /* Very small phones (iPhone SE, Galaxy A series, etc.) */
        @media screen and (max-width: 375px) {
            h1 {
                font-size: clamp(1.8rem, 10vw, 2.5rem);
            }

            .intention-text {
                font-size: 0.9rem;
            }

            .btn {
                padding: 1rem 2rem;
                font-size: 1rem;
                margin-bottom: 6vh;
            }

            .picker li {
                height: 95px;
                font-size: 3rem;
            }

            .picker-overlay {
                height: 95px;
            }

            .picker {
                padding-top: calc(22.5vh - 47px);
                padding-bottom: calc(22.5vh - 47px);
            }

            .circle {
                width: clamp(200px, 78vw, 300px);
                height: clamp(200px, 78vw, 300px);
            }

            .breathe-text {
                font-size: 1.7rem;
            }

            .streak-number {
                font-size: clamp(3rem, 20vw, 4.5rem);
            }

            .chart-container {
                height: 110px;
                gap: 2px;
            }
        }

        /* ===== MOBILE LANDSCAPE (Phones and smaller layout devices) ===== */
        /* Targets landscape orientation on small/medium height screens (iPhones, Samsungs, Pixels) */
        @media screen and (max-height: 500px) and (orientation: landscape) {

            /* General container */
            .screen {
                justify-content: center;
            }

            /* Home Screen */
            h1 {
                margin-top: 10vh !important;
                font-size: clamp(1.5rem, 6vh, 2.5rem);
                margin-bottom: 0.5rem;
            }

            h2 {
                margin-top: 2vh !important;
                font-size: clamp(1.2rem, 5vh, 2rem);
            }

            .intention-text {
                font-size: 0.9rem;
                margin-bottom: 0.5rem;
                min-height: 1.5rem;
                max-width: 90%;
            }

            .btn {
                padding: 0.8rem 2rem;
                font-size: 1rem;
                margin-bottom: 8vh;
                margin-top: 0.5rem;
                min-height: 44px;
            }

            /* Picker adjustments for Landscape */
            .picker-wrapper {
                height: 40vh;
                margin: 0.5rem 0;
            }

            .picker li {
                height: 70px;
                font-size: 2.5rem;
            }

            .picker-overlay {
                height: 70px;
                width: 50%;
            }

            .picker {
                padding-top: calc(20vh - 35px);
                padding-bottom: calc(20vh - 35px);
            }

            /* Breathing circle for Landscape */
            .circle {
                width: clamp(150px, 60vh, 250px);
                height: clamp(150px, 60vh, 250px);
            }

            .breathe-text {
                font-size: 1.5rem;
            }

            /* Session complete UI */
            .s4-ui {
                padding: 10vh 0 5vh 0;
            }

            /* Streak Screen adjustments for Landscape */
            .streak-screen {
                padding: 10vh 1rem 2vh;
            }

            .streak-counter {
                margin: 0.5rem 0;
                display: flex;
                flex-direction: row;
                align-items: center;
                justify-content: center;
                gap: 1rem;
            }

            .streak-number {
                font-size: clamp(3rem, 15vh, 4.5rem);
            }

            .streak-quote {
                margin: 1vh auto;
                font-size: 0.9rem;
                max-width: 80%;
            }

            .chart-section {
                margin: 1rem auto;
            }

            .chart-container {
                height: 90px;
            }

            .chart-title {
                margin-bottom: 0.5rem;
            }
        }
    </style>
</head>

<body>

    <!-- Quotes button -->
    <button class="quotes-btn" id="quotesBtn" onclick="openQuotes()">Quotes</button>

    <!-- Streak button (visible on all screens) -->
    <button class="streak-btn" id="streakBtn" onclick="openStreak()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
        </svg>
        <span id="streakBtnLabel">0</span>
    </button>

    <div id="s1" class="screen active">
        <h1 style="margin-top: 20vh;">ZenBreath</h1>
        <div id="dailyIntention" class="intention-text"></div>
        <button class="btn" onclick="nav('s2')">Start Breathing</button>
    </div>

    <div id="s2" class="screen">
        <h2 style="margin-top: 5vh;">Select Duration</h2>
        <div class="picker-wrapper">
            <div id="pickerOverlay" class="picker-overlay" onclick="startSession()">
                <span id="pickerUnit" style="opacity:0.5">sec</span>
            </div>
            <ul id="picker" class="picker"></ul>
        </div>
        <button class="btn" onclick="startSession()">Begin</button>
    </div>

    <div id="s34" class="screen">
        <div id="mainCircle" class="circle">
            <svg id="checkSvg" class="check-svg" viewBox="0 0 52 52">
                <path class="check-path" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"
                    d="M14 27 l 8 8 l 16 -16" />
            </svg>
        </div>
        <div id="breatheText" class="breathe-text">Inhale</div>
        <div id="s4UI" class="s4-ui">

        const positiveQuotesLength = positiveQuotes.length;
        function getPositiveQuote(idx) { return positiveQuotes[idx]; }

        function pickKRandomIndices(total, k) {
            if (k >= total) {
                const all = new Array(total);
                for (let i = 0; i < total; i++) all[i] = i;
                // Fisher-Yates
                for (let i = total - 1; i > 0; i--) {
                    const j = (Math.random() * (i + 1)) | 0;
                    const tmp = all[i]; all[i] = all[j]; all[j] = tmp;
                }
                return all;
            }
            const result = new Array(k);
            const seen = new Set();
            let n = 0;
            while (n < k) {
                const i = (Math.random() * total) | 0;
                if (!seen.has(i)) {
                    seen.add(i);
                    result[n++] = i;
                }
            }
            return result;
        }

        const quotesFeedEl = document.getElementById('quotesFeed');

        function renderQuotesFeed() {
            quotesFeedEl.textContent = '';
            const count = Math.min(positiveQuotesLength, 120);
            const indices = pickKRandomIndices(positiveQuotesLength, count);
            const frag = document.createDocumentFragment();
            for (let i = 0; i < indices.length; i++) {
                const div = document.createElement('div');
                div.className = 'quotes-feed-item';
                // Curated quotes already include their own quotation marks + attribution.
                div.textContent = getPositiveQuote(indices[i]);
                // Cap stagger so the entire feed has finished animating well before
                // the user can scroll far — avoids running animations during scroll.
                const delay = i < 30 ? i * 0.025 : 0.75;
                div.style.animationDelay = delay + 's';
                frag.appendChild(div);
            }
            quotesFeedEl.appendChild(frag);
            quotesScreenEl.scrollTop = 0;
        }

        function openQuotes() {
            const activeScreen = document.querySelector('.screen.active');
            if (activeScreen && activeScreen.id !== 'quotesScreen') previousScreen = activeScreen.id;
            nav('quotesScreen');
            quotesBtnEl.style.display = 'none';
            streakBtnEl.style.display = 'none';
            renderQuotesFeed();
        }

        function closeQuotes() {
            nav(previousScreen);
            if (previousScreen !== 's34') {
                quotesBtnEl.style.display = '';
                streakBtnEl.style.display = '';
            }
        }

        function openStreak() {
            const activeScreen = document.querySelector('.screen.active');
            if (activeScreen && activeScreen.id !== 'streakScreen') previousScreen = activeScreen.id;
            nav('streakScreen');
            streakBtnEl.style.display = 'none';
            quotesBtnEl.style.display = 'none';
            renderStreakScreen();
        }
        function closeStreak() {
            nav(previousScreen);
            if (previousScreen !== 's34') {
                streakBtnEl.style.display = '';
                quotesBtnEl.style.display = '';
            }
        }

        const streakQuoteEl = document.getElementById('streakQuote');
        const streakNumberEl = document.getElementById('streakNumber');
        const streakChartEl = document.getElementById('streakChart');

        function renderStreakScreen() {
            // Quote (non-repeating)
            let seenQ = [];
            try { seenQ = JSON.parse(localStorage.getItem('zen_seen_q') || '[]'); } catch (e) { }
            if (seenQ.length >= motivQuotesLength) seenQ = [];
            const seenSet = new Set(seenQ);
            let qIdx;
            do { qIdx = (Math.random() * motivQuotesLength) | 0; } while (seenSet.has(qIdx));
            streakQuoteEl.textContent = '"' + getMotivQuote(qIdx) + '"';
            seenQ.push(qIdx);
            try { localStorage.setItem('zen_seen_q', JSON.stringify(seenQ)); } catch (e) { }
            setTimeout(() => streakQuoteEl.classList.add('show'), 100);

            // Single shared session log read for streak number + chart
            const log = getSessionLog();
            streakNumberEl.textContent = calcStreak(log);

            // Chart
            streakChartEl.textContent = '';
            const days = getLast14Days(log);
            let maxMins = 1;
            for (let i = 0; i < days.length; i++) if (days[i].mins > maxMins) maxMins = days[i].mins;

            const frag = document.createDocumentFragment();
            const bars = new Array(days.length);
            for (let i = 0; i < days.length; i++) {
                const d = days[i];
                const wrap = document.createElement('div');
                wrap.className = 'chart-bar-wrap';
                const minsLabel = document.createElement('div');
                minsLabel.className = 'chart-mins';
                minsLabel.textContent = d.mins > 0 ? d.mins + 'm' : '';
                const bar = document.createElement('div');
                bar.className = 'chart-bar' + (d.mins === 0 ? ' empty' : '') + (d.isToday ? ' today' : '');
                bar.style.height = '3px';
                const label = document.createElement('div');
                label.className = 'chart-day' + (d.isToday ? ' today' : '');
                label.textContent = d.isToday ? 'Today' : d.label;
                wrap.appendChild(minsLabel);
                wrap.appendChild(bar);
                wrap.appendChild(label);
                frag.appendChild(wrap);
                bars[i] = { bar, target: d.mins > 0 ? Math.max(8, (d.mins / maxMins) * 140) + 'px' : '3px' };
            }
            streakChartEl.appendChild(frag);
            // Single double-rAF to flush all bar heights together
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    for (let i = 0; i < bars.length; i++) bars[i].bar.style.height = bars[i].target;
                });
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const intentionEl = document.getElementById('dailyIntention');
            let seen = [];
            try { seen = JSON.parse(localStorage.getItem('zen_seen') || '[]'); } catch (e) { }
            if (seen.length >= intentionsLength) seen = [];
            const seenSet = new Set(seen);
            let randomIdx;
            do { randomIdx = (Math.random() * intentionsLength) | 0; } while (seenSet.has(randomIdx));
            intentionEl.textContent = '"' + getIntention(randomIdx) + '"';
            seen.push(randomIdx);
            try { localStorage.setItem('zen_seen', JSON.stringify(seen)); } catch (e) { }
            setTimeout(() => intentionEl.style.opacity = '1', 150);

            // Build picker items in a single fragment to avoid 31 reflows
            const frag = document.createDocumentFragment();
            const li30 = document.createElement('li');
            li30.textContent = '30';
            frag.appendChild(li30);
            for (let i = 1; i <= 30; i++) {
                const li = document.createElement('li');
                li.textContent = String(i).padStart(2, '0');
                frag.appendChild(li);
            }
            picker.appendChild(frag);
            requestAnimationFrame(updateScrollVisuals);
        });

        function nav(id) {
            for (let i = 0; i < screenEls.length; i++) screenEls[i].classList.remove('active');
            const target = document.getElementById(id);
            if (target) target.classList.add('active');
        }

        // Picker layout cache — invalidated on resize / orientation change
        let pickerLayoutValid = false;
        let pickerCenter = 0;
        let pickerPaddingTop = 0;
        let pickerChildren = null;

        function cachePickerLayout() {
            const kids = picker.children;
            if (!kids.length) return;
            pickerChildren = kids;
            itemHeight = kids[0].offsetHeight;
            pickerCenter = picker.clientHeight / 2;
            const cs = getComputedStyle(picker);
            pickerPaddingTop = parseFloat(cs.paddingTop) || 0;
            pickerLayoutValid = itemHeight > 0;
        }

        function updateScrollVisuals() {
            if (!pickerLayoutValid) {
                cachePickerLayout();
                if (!pickerLayoutValid) return;
            }
            const scrollY = picker.scrollTop;
            const halfH = itemHeight * 0.5;
            const len = pickerChildren.length;
            let centerIdx = 0;
            let minDiv = Infinity;

            for (let i = 0; i < len; i++) {
                // Equal-height items: derive offsetTop instead of triggering layout reads
                const dist = (pickerPaddingTop + i * itemHeight) - scrollY + halfH - pickerCenter;
                const absDist = dist < 0 ? -dist : dist;
                const norm = dist / itemHeight;
                const absNorm = norm < 0 ? -norm : norm;
                if (absDist < minDiv) { minDiv = absDist; centerIdx = i; }
                const li = pickerChildren[i];
                const scale = absNorm * 0.2; // 1 - scale → final
                li.style.transform = 'rotateX(' + (norm * -30) + 'deg) scale(' + (scale > 0.6 ? 0.4 : 1 - scale) + ') translateZ(0)';
                const op = 1 - absNorm * 0.6;
                li.style.opacity = op < 0.1 ? 0.1 : op;
            }

            if (centerIdx !== lastIndex) {
                if (navigator.vibrate) navigator.vibrate(10);
                lastIndex = centerIdx;
                selectedDurationMs = centerIdx === 0 ? 30000 : centerIdx * 60000;
                pickerUnitEl.textContent = centerIdx === 0 ? 'sec' : 'min';
            }
        }

        // Debounce: at most one rAF in flight per scroll burst
        let scrollPending = false;
        picker.addEventListener('scroll', () => {
            if (scrollPending) return;
            scrollPending = true;
            requestAnimationFrame(() => {
                scrollPending = false;
                updateScrollVisuals();
            });
        }, { passive: true });

        window.addEventListener('resize', () => { pickerLayoutValid = false; }, { passive: true });
        window.addEventListener('orientationchange', () => { pickerLayoutValid = false; }, { passive: true });

        let arrowScrolling = false;
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (s1El.classList.contains('active')) {
                    nav('s2');
                } else if (s2El.classList.contains('active')) {
                    startSession();
                }
                return;
            }

            if (!s2El.classList.contains('active')) return;

            if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                e.preventDefault();
                if (arrowScrolling) return;
                arrowScrolling = true;
                const dir = e.key === 'ArrowUp' ? -1 : 1;
                const mode = e.repeat ? 'instant' : 'smooth';
                picker.scrollBy({ top: dir * itemHeight, behavior: mode });
                setTimeout(() => { arrowScrolling = false; }, e.repeat ? 80 : 200);
            }
        });

        async function startSession() {
            nav('s34');
            isSessionActive = true;
            streakBtnEl.style.display = 'none';
            quotesBtnEl.style.display = 'none';
            requestWakeLock();

            mainCircle.style.transform = 'scale(0.4)';
            breatheText.style.opacity = '1';

            const start = performance.now();
            mainCircle.classList.add('animate-breathe');

            let textFaded = false;
            let lastBreatheText = '';
            function loop(now) {
                if (!isSessionActive || !s34El.classList.contains('active')) return;

                const elapsed = now - start;

                if (!textFaded && elapsed < 26000) {
                    const p = elapsed % 12000;
                    let target;
                    if (p < 4500) target = 'Inhale';
                    else if (p < 6000) target = 'Hold';
                    else if (p < 10500) target = 'Exhale';
                    else target = 'Hold';
                    // Only touch the DOM when the label actually changes
                    if (target !== lastBreatheText) {
                        breatheText.textContent = target;
                        lastBreatheText = target;
                    }
                } else if (!textFaded) {
                    breatheText.style.opacity = '0';
                    textFaded = true;
                }

                if (elapsed >= selectedDurationMs) endSession();
                else requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);
        }

        function endSession() {
            isSessionActive = false;
            releaseWakeLock();

            // Log the completed session
            logSession(Math.round(selectedDurationMs / 60000));
            updateStreakBtn();

            // Trap bounding container scale
            const transform = window.getComputedStyle(mainCircle).transform;
            mainCircle.classList.remove('animate-breathe');
            mainCircle.style.transform = transform;
            void mainCircle.offsetWidth; // Force Reflow

            // Shrink entire container and turn green
            mainCircle.style.transition = 'transform 1.2s ease, background-color 1.2s ease';
            mainCircle.style.transform = 'scale(0.5)';
            mainCircle.style.backgroundColor = 'var(--success)';

            breatheText.style.opacity = '0';
            checkSvgEl.classList.add('active');
            s4UIEl.classList.add('active');
        }

        function resetToHome() { location.reload(); }

        // Initialize streak button count on load
        updateStreakBtn();
