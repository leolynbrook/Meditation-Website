        let userVolume = 0.5; // 0..1, scaled to masterGain

        function ensureCtx() {
            if (!audioCtx) {
                const Ctx = window.AudioContext || window.webkitAudioContext;
                if (!Ctx) return null;
                try {
                    audioCtx = new Ctx();
                    masterGain = audioCtx.createGain();
                    masterGain.gain.value = userVolume * 0.35;
                    masterGain.connect(audioCtx.destination);
                } catch (e) {
                    // Audio hardware unavailable / blocked — degrade gracefully
                    audioCtx = null;
                    return null;
                }
            }
            if (audioCtx.state === 'suspended') {
                // Always handle the Promise — Safari rejects it if not in a user gesture.
                Promise.resolve(audioCtx.resume()).catch(() => { });
            }
            return audioCtx;
        }

        function applyVolume() {
            if (masterGain) {
                const target = userVolume * 0.35;
                const t = audioCtx.currentTime;
                masterGain.gain.cancelScheduledValues(t);
                masterGain.gain.setTargetAtTime(target, t, 0.05);
            }
        }

        function buildNoiseBuffer(ctx, kind) {
            const length = ctx.sampleRate * 4;
            const buffer = ctx.createBuffer(2, length, ctx.sampleRate);
            for (let ch = 0; ch < 2; ch++) {
                const data = buffer.getChannelData(ch);
                if (kind === 'white') {
                    for (let i = 0; i < length; i++) data[i] = Math.random() * 2 - 1;
                } else {
                    // brown noise (used for brown + ocean + rain + wind + fire base)
                    let last = 0;
                    for (let i = 0; i < length; i++) {
                        const w = Math.random() * 2 - 1;
                        last = (last + 0.02 * w) / 1.02;
                        data[i] = last * 3.5;
                    }
                }
            }
            return buffer;
        }

        function fadeAndStop(handle) {
            if (!handle) return;
            const ctx = audioCtx;
            const t = ctx.currentTime;
            try {
                handle.gain.gain.cancelScheduledValues(t);
                handle.gain.gain.setValueAtTime(handle.gain.gain.value, t);
                handle.gain.gain.linearRampToValueAtTime(0, t + 0.4);
            } catch (e) { }
            setTimeout(() => {
                try { handle.cleanup && handle.cleanup(); } catch (e) { }
            }, 450);
        }

        function makeFadeInGain(ctx) {
            const gain = ctx.createGain();
            gain.gain.value = 0;
            gain.gain.linearRampToValueAtTime(1, ctx.currentTime + 0.6);
            gain.connect(masterGain);
            return gain;
        }

        function startAmbient(kind) {
            const ctx = ensureCtx();
            if (!ctx) return null;
            const gain = makeFadeInGain(ctx);

            if (kind === 'white' || kind === 'brown') {
                const src = ctx.createBufferSource();
                src.buffer = buildNoiseBuffer(ctx, kind);
                src.loop = true;
                src.connect(gain);
                src.start();
                return { gain, cleanup: () => { try { src.stop(); } catch (e) { } } };
            }

            if (kind === 'rain') {
                const src = ctx.createBufferSource();
                src.buffer = buildNoiseBuffer(ctx, 'white');
                src.loop = true;
                const hp = ctx.createBiquadFilter();
                hp.type = 'highpass';
                hp.frequency.value = 900;
                const lp = ctx.createBiquadFilter();
                lp.type = 'lowpass';
                lp.frequency.value = 5500;
                src.connect(hp).connect(lp).connect(gain);
                src.start();
                return { gain, cleanup: () => { try { src.stop(); } catch (e) { } } };
            }

            if (kind === 'ocean') {
                const src = ctx.createBufferSource();
                src.buffer = buildNoiseBuffer(ctx, 'brown');
                src.loop = true;
                const lp = ctx.createBiquadFilter();
                lp.type = 'lowpass';
                lp.frequency.value = 550;
                const swell = ctx.createGain();
                swell.gain.value = 0.55;
                const lfo = ctx.createOscillator();
                lfo.frequency.value = 0.13;
                const lfoAmp = ctx.createGain();
                lfoAmp.gain.value = 0.4;
                lfo.connect(lfoAmp).connect(swell.gain);
                src.connect(lp).connect(swell).connect(gain);
                src.start();
                lfo.start();
                return {
                    gain, cleanup: () => {
                        try { src.stop(); } catch (e) { }
                        try { lfo.stop(); } catch (e) { }
                    }
                };
            }

            if (kind === 'wind') {
                // Filtered brown noise + LFO-modulated cutoff for gusts.
                const src = ctx.createBufferSource();
                src.buffer = buildNoiseBuffer(ctx, 'brown');
                src.loop = true;

                const lp = ctx.createBiquadFilter();
                lp.type = 'lowpass';
                lp.frequency.value = 700;
                lp.Q.value = 0.5;

                // Cutoff LFO — slow gusts pushing brightness up and back
                const cutoffLfo = ctx.createOscillator();
                cutoffLfo.frequency.value = 0.07;
                const cutoffDepth = ctx.createGain();
                cutoffDepth.gain.value = 450;
                cutoffLfo.connect(cutoffDepth).connect(lp.frequency);

                // Amplitude swell so the gust feels like it has weight
                const swell = ctx.createGain();
                swell.gain.value = 0.55;
                const ampLfo = ctx.createOscillator();
                ampLfo.frequency.value = 0.05;
                const ampDepth = ctx.createGain();
                ampDepth.gain.value = 0.35;
                ampLfo.connect(ampDepth).connect(swell.gain);

                src.connect(lp).connect(swell).connect(gain);
                src.start();
                cutoffLfo.start();
                ampLfo.start();
                return {
                    gain, cleanup: () => {
                        try { src.stop(); } catch (e) { }
                        try { cutoffLfo.stop(); } catch (e) { }
                        try { ampLfo.stop(); } catch (e) { }
                    }
                };
            }

            if (kind === 'fire') {
                // Warm low-passed brown noise bed + random short crackle pops.
                const bedSrc = ctx.createBufferSource();
                bedSrc.buffer = buildNoiseBuffer(ctx, 'brown');
                bedSrc.loop = true;
                const bedLp = ctx.createBiquadFilter();
                bedLp.type = 'lowpass';
                bedLp.frequency.value = 700;
                const bedGain = ctx.createGain();
                bedGain.gain.value = 0.7;
                bedSrc.connect(bedLp).connect(bedGain).connect(gain);
                bedSrc.start();

                // Pre-build a short noise buffer reused for crackle bursts
                const crackleBuf = buildNoiseBuffer(ctx, 'white');
                const stopFlag = { stopped: false };
                let timer = null;
                function popCrackle() {
                    if (stopFlag.stopped) return;
                    const now = ctx.currentTime;
                    const burst = ctx.createBufferSource();
                    burst.buffer = crackleBuf;
                    burst.playbackRate.value = 0.8 + Math.random() * 0.6;
                    const bp = ctx.createBiquadFilter();
                    bp.type = 'bandpass';
                    bp.frequency.value = 1100 + Math.random() * 2400;
                    bp.Q.value = 1.4;
                    const env = ctx.createGain();
                    const dur = 0.02 + Math.random() * 0.07;
                    env.gain.setValueAtTime(0, now);
                    env.gain.linearRampToValueAtTime(0.35 + Math.random() * 0.4, now + 0.004);
                    env.gain.exponentialRampToValueAtTime(0.001, now + dur);
                    burst.connect(bp).connect(env).connect(gain);
                    burst.start(now);
                    burst.stop(now + dur + 0.05);
                    timer = setTimeout(popCrackle, 80 + Math.random() * 380);
                }
                popCrackle();

                return {
                    gain, cleanup: () => {
                        stopFlag.stopped = true;
                        if (timer) clearTimeout(timer);
                        try { bedSrc.stop(); } catch (e) { }
                    }
                };
            }

            if (kind === 'birds') {
                // Forest-bed (very quiet wind underneath) + random sine-wave chirps.
                const bedSrc = ctx.createBufferSource();
                bedSrc.buffer = buildNoiseBuffer(ctx, 'brown');
                bedSrc.loop = true;
                const bedLp = ctx.createBiquadFilter();
                bedLp.type = 'lowpass';
                bedLp.frequency.value = 600;
                const bedGain = ctx.createGain();
                bedGain.gain.value = 0.18;
                bedSrc.connect(bedLp).connect(bedGain).connect(gain);
                bedSrc.start();

                const stopFlag = { stopped: false };
                let timer = null;
                function chirp() {
                    if (stopFlag.stopped) return;
                    // 1-3 quick notes per "call"
                    const noteCount = 1 + (Math.random() * 3) | 0;
                    const baseFreq = 1900 + Math.random() * 2600; // 1.9-4.5kHz
                    for (let i = 0; i < noteCount; i++) {
                        const start = audioCtx.currentTime + i * (0.06 + Math.random() * 0.08);
                        const dur = 0.07 + Math.random() * 0.16;
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        const f = baseFreq * (0.85 + Math.random() * 0.3);
                        osc.frequency.setValueAtTime(f, start);
                        osc.frequency.exponentialRampToValueAtTime(f * (0.7 + Math.random() * 0.6), start + dur);
                        const env = ctx.createGain();
                        env.gain.setValueAtTime(0, start);
                        env.gain.linearRampToValueAtTime(0.22 + Math.random() * 0.12, start + 0.012);
                        env.gain.exponentialRampToValueAtTime(0.001, start + dur);
                        osc.connect(env).connect(gain);
                        osc.start(start);
                        osc.stop(start + dur + 0.05);
                    }
                    timer = setTimeout(chirp, 350 + Math.random() * 2400);
                }
                chirp();

                return {
                    gain, cleanup: () => {
                        stopFlag.stopped = true;
                        if (timer) clearTimeout(timer);
                        try { bedSrc.stop(); } catch (e) { }
                    }
                };
            }

            return null;
        }

        function setSound(kind) {
            if (kind === currentSound) return;
            // Validate against the known sound table so a stale localStorage value or
            // injected DOM attribute can't drive us into an undefined startAmbient branch.
            if (!Object.prototype.hasOwnProperty.call(SOUND_LABELS, kind)) return;

            // Tear down. fadeAndStop holds its own reference and self-cleans after 450ms,
            // so rapid switching can't leak — each old handle continues to fade independently.
            if (activeHandle) fadeAndStop(activeHandle);
            activeHandle = null;
            currentSound = kind;

            // Update chips
            const chips = audioPopoverEl.querySelectorAll('.audio-chip');
            for (let i = 0; i < chips.length; i++) {
                chips[i].classList.toggle('active', chips[i].dataset.sound === kind);
            }
            // Update button state
            const isOn = kind !== 'off';
            audioBtnEl.classList.toggle('on', isOn);
            audioBtnLabelEl.textContent = SOUND_LABELS[kind] || 'Sound';
            audioWave1El.style.display = isOn ? '' : 'none';
            audioWave2El.style.display = isOn ? '' : 'none';
            audioMuteEl.style.display = isOn ? 'none' : '';
            audioMute2El.style.display = isOn ? 'none' : '';

            // Persist
            storageSet('zen_sound', kind);

            if (kind === 'off') return;

            // Audio hardware failures (rare, but real on locked Chromebooks / managed Windows)
            // shouldn't take down the rest of the meditation flow.
            try {
                activeHandle = startAmbient(kind);
                if (!activeHandle) {
                    // startAmbient returned null — context unavailable. Revert visual state.
                    currentSound = 'off';
                    audioBtnEl.classList.remove('on');
                    audioBtnLabelEl.textContent = 'Sound';
                    audioWave1El.style.display = 'none';
                    audioWave2El.style.display = 'none';
                    audioMuteEl.style.display = '';
                    audioMute2El.style.display = '';
                    chips.forEach(c => c.classList.toggle('active', c.dataset.sound === 'off'));
                }
            } catch (e) {
                activeHandle = null;
                currentSound = 'off';
            }
        }

        function toggleAudioPopover() {
            popoverOpen = !popoverOpen;
            audioPopoverEl.classList.toggle('open', popoverOpen);
            document.body.classList.toggle('popover-open', popoverOpen);
        }

        function closeAudioPopover() {
            if (!popoverOpen) return;
            popoverOpen = false;
            audioPopoverEl.classList.remove('open');
            document.body.classList.remove('popover-open');
        }

        /* --- Hold-and-drag-left to mute -----------------------------------
           Tap the button = open the picker. Press-and-hold the button = the
           rail eases in to the left as a hint. Drag the button left past the
           threshold and release = sound switches off. Works for mouse,
           trackpad, pen, and touch via the unified Pointer Events API. */
        const audioControlEl = document.getElementById('audioControl');
        const audioMuteTrackEl = document.getElementById('audioMuteTrack');

        const HOLD_HINT_DELAY_MS = 220;   // press-and-wait before rail eases in
        const DRAG_TRIGGER_PX = 5;        // leftward delta that locks drag mode
        const MUTE_THRESHOLD = 0.7;       // commit if released past this fraction
        const MUTE_DRAG_FALLBACK = 110;   // used only if measurement fails

        let holdTimer = null;
        let holdState = null;
        let suppressNextClick = false;

        function clearHoldTimer() {
            if (holdTimer !== null) {
                clearTimeout(holdTimer);
                holdTimer = null;
            }
        }

        function tryHaptic(pattern) {
            // Best-effort: only Android/Chrome implement vibrate; iOS ignores it.
            if (navigator.vibrate) {
                try { navigator.vibrate(pattern); } catch (e) { /* ignore */ }
            }
        }

        /* Distance the button must slide left so its centre lands exactly on
           the rail's centre — at that point the two pills overlap completely
           and the rail is fully covered. Measured live so it stays correct
           across phone / tablet / desktop breakpoints. */
        function measureMuteDragDistance() {
            const railRect = audioMuteTrackEl.getBoundingClientRect();
            const btnRect = audioBtnEl.getBoundingClientRect();
            // If the rail is hidden / unmeasurable, fall back to a sensible
            // constant so the gesture still works.
            if (!railRect.width || !btnRect.width) return MUTE_DRAG_FALLBACK;
            const railCenter = railRect.left + railRect.width / 2;
            const btnCenter = btnRect.left + btnRect.width / 2;
            return Math.max(60, btnCenter - railCenter);
        }

        function updateMuteDrag(dx) {
            const dist = holdState.dragDistance;
            const clamped = Math.max(-dist, Math.min(0, dx));
            const progress = -clamped / dist;
            audioBtnEl.style.setProperty('--drag-x', clamped + 'px');
            audioMuteTrackEl.style.setProperty('--mute-progress', progress.toFixed(3));

            const armed = progress >= MUTE_THRESHOLD;
            if (armed !== holdState.armed) {
                holdState.armed = armed;
                audioMuteTrackEl.classList.toggle('armed', armed);
                audioBtnEl.classList.toggle('armed', armed);
                if (armed) tryHaptic(14);
            }
        }

        function resetMuteUI() {
            audioControlEl.classList.remove('dragging');
            audioMuteTrackEl.classList.remove('active', 'armed');
            audioBtnEl.classList.remove('armed');
            audioBtnEl.style.setProperty('--drag-x', '0px');
            audioMuteTrackEl.style.setProperty('--mute-progress', '0');
        }

        audioBtnEl.addEventListener('pointerdown', (e) => {
            // Mouse: only respond to primary button. Touch/pen pass through.
            if (e.pointerType === 'mouse' && e.button !== 0) return;
            // The gesture is meaningless when nothing is playing — fall through
            // to the default click→toggle behavior so users can open the picker.
            if (currentSound === 'off') return;

            // Clear any stale flag from a previous gesture that didn't reach click.
            suppressNextClick = false;

            holdState = {
                pointerId: e.pointerId,
                startX: e.clientX,
                startY: e.clientY,
                hintShown: false,
                dragging: false,
                armed: false,
                // Snapshot the distance once at gesture start; it can't change
                // mid-drag and a single measurement avoids per-frame layout work.
                dragDistance: measureMuteDragDistance(),
            };

            // Capture so pointermove/up keep firing if the finger leaves the button.
            try { audioBtnEl.setPointerCapture(e.pointerId); } catch (err) { /* older browsers */ }

            holdTimer = setTimeout(() => {
                holdTimer = null;
                if (!holdState || holdState.dragging) return;
                holdState.hintShown = true;
                audioMuteTrackEl.classList.add('active');
                tryHaptic(8);
            }, HOLD_HINT_DELAY_MS);
        });

        audioBtnEl.addEventListener('pointermove', (e) => {
            if (!holdState || holdState.pointerId !== e.pointerId) return;
            const dx = e.clientX - holdState.startX;
            const dy = e.clientY - holdState.startY;

            if (!holdState.dragging) {
                // Vertical motion clearly winning — abandon so vertical
                // scroll / other pointer interpreters can take over cleanly.
                if (Math.abs(dy) > 18 && Math.abs(dy) > Math.abs(dx) * 1.4) {
                    clearHoldTimer();
                    try { audioBtnEl.releasePointerCapture(e.pointerId); } catch (err) {}
                    resetMuteUI();
                    holdState = null;
                    return;
                }
                if (dx < -DRAG_TRIGGER_PX) {
                    holdState.dragging = true;
                    clearHoldTimer();
                    audioMuteTrackEl.classList.add('active');
                    audioControlEl.classList.add('dragging');
                    suppressNextClick = true;
                    if (!holdState.hintShown) tryHaptic(8);
                }
            }

            if (holdState.dragging) updateMuteDrag(dx);
        });

        function endMuteHold(e) {
            if (!holdState || holdState.pointerId !== e.pointerId) return;
            const wasDragging = holdState.dragging;
            const wasArmed = holdState.armed;
            const wasHinted = holdState.hintShown;

            try { audioBtnEl.releasePointerCapture(e.pointerId); } catch (err) {}
            clearHoldTimer();
            resetMuteUI();
            holdState = null;

            // Long press shown the rail but no drag → swallow the click so we
            // don't surprise the user by also opening the picker.
            if (wasHinted && !wasDragging) suppressNextClick = true;

            if (wasDragging && wasArmed) {
                setSound('off');
                closeAudioPopover();
            }
        }

        audioBtnEl.addEventListener('pointerup', endMuteHold);
        audioBtnEl.addEventListener('pointercancel', endMuteHold);

        // Tap = open the picker. Replaces the inline onclick so we can swallow
        // clicks that came from a hold/drag gesture.
        audioBtnEl.addEventListener('click', (e) => {
            if (suppressNextClick) {
                suppressNextClick = false;
                e.preventDefault();
                e.stopImmediatePropagation();
                return;
            }
            toggleAudioPopover();
        });

        // Close popover on outside tap. Use the wrapper so the rail (a sibling
        // of the button inside the wrapper) is treated as part of the control.
        document.addEventListener('click', (e) => {
            if (!popoverOpen) return;
            if (audioPopoverEl.contains(e.target) || audioControlEl.contains(e.target)) return;
            closeAudioPopover();
        });

        // Chip clicks
        audioPopoverEl.addEventListener('click', (e) => {
            const chip = e.target.closest('.audio-chip');
            if (!chip) return;
            setSound(chip.dataset.sound);
            // Close popover after selection so the meditative UI returns to its quiet state
            setTimeout(closeAudioPopover, 200);
        });

        // (visibility / bfcache resume handled by the consolidated handlePageVisible above)

        // Volume slider
        const audioVolumeEl = document.getElementById('audioVolume');
        function setVolumePct(pct) {
            const clamped = Math.max(0, Math.min(100, pct | 0));
            userVolume = clamped / 100;
            audioVolumeEl.value = clamped;
            audioVolumeEl.style.setProperty('--vol-pct', clamped + '%');
            applyVolume();
            storageSet('zen_volume', String(clamped));
        }
        {
            const savedVol = storageGet('zen_volume', null);
            if (savedVol !== null) {
                const v = parseInt(savedVol, 10);
                if (!isNaN(v)) {
                    userVolume = Math.max(0, Math.min(100, v)) / 100;
                    audioVolumeEl.value = v;
                    audioVolumeEl.style.setProperty('--vol-pct', v + '%');
                } else {
                    audioVolumeEl.style.setProperty('--vol-pct', '50%');
                }
            } else {
                audioVolumeEl.style.setProperty('--vol-pct', '50%');
            }
        }

        audioVolumeEl.addEventListener('input', (e) => {
            // Ensure ctx exists so applyVolume has a target — mobile users dragging the
            // slider before picking a sound expect their preference to stick.
            if (currentSound !== 'off') ensureCtx();
            setVolumePct(parseInt(e.target.value, 10));
        });

        // Restore sound preference (but only resume audio after a user gesture)
        let pendingRestoreSound = null;
        {
            const saved = storageGet('zen_sound', null);
            if (saved && saved !== 'off' && SOUND_LABELS[saved]) {
                pendingRestoreSound = saved;
                // Reflect chip selection visually without starting audio yet
                const chips = audioPopoverEl.querySelectorAll('.audio-chip');
                for (let i = 0; i < chips.length; i++) {
                    chips[i].classList.toggle('active', chips[i].dataset.sound === saved);
                }
                audioBtnEl.classList.add('on');
                audioBtnLabelEl.textContent = SOUND_LABELS[saved];
                audioWave1El.style.display = '';
                audioWave2El.style.display = '';
                audioMuteEl.style.display = 'none';
                audioMute2El.style.display = 'none';
            }
        }

        function resumePendingSoundOnGesture() {
            if (!pendingRestoreSound) return;
            const k = pendingRestoreSound;
            pendingRestoreSound = null;
            currentSound = 'off';
            setSound(k);
        }
        document.addEventListener('pointerdown', resumePendingSoundOnGesture, { once: true });
        document.addEventListener('keydown', resumePendingSoundOnGesture, { once: true });

        document.addEventListener('DOMContentLoaded', () => {
            const intentionEl = document.getElementById('dailyIntention');
            let seen = storageGetJSON('zen_seen', []);
            if (!Array.isArray(seen) || seen.length >= intentionsLength) seen = [];
            const seenSet = new Set(seen);
            let randomIdx;
            do { randomIdx = (Math.random() * intentionsLength) | 0; } while (seenSet.has(randomIdx));
            intentionEl.textContent = '"' + getIntention(randomIdx) + '"';
            seen.push(randomIdx);
            storageSetJSON('zen_seen', seen);
            setTimeout(() => intentionEl.style.opacity = '1', 150);

            // Build picker items in a single fragment to avoid 31 reflows
            const frag = document.createDocumentFragment();
            const li30 = document.createElement('li');
            li30.textContent = '30';
            frag.appendChild(li30);
            for (let i = 1; i <= 30; i++) {
                const li = document.createElement('li');
                li.textContent = String(i).padStart(2, '0');
                frag.appendChild(li);
            }
            picker.appendChild(frag);
            requestAnimationFrame(updateScrollVisuals);
        });

        function nav(id) {
            for (let i = 0; i < screenEls.length; i++) screenEls[i].classList.remove('active');
            const target = document.getElementById(id);
            if (target) target.classList.add('active');
        }

        // Picker layout cache — invalidated on resize / orientation change
        let pickerLayoutValid = false;
        let pickerCenter = 0;
        let pickerPaddingTop = 0;
        let pickerChildren = null;

        function cachePickerLayout() {
            const kids = picker.children;
            if (!kids.length) return;
            pickerChildren = kids;
            itemHeight = kids[0].offsetHeight;
            pickerCenter = picker.clientHeight / 2;
            const cs = getComputedStyle(picker);
            pickerPaddingTop = parseFloat(cs.paddingTop) || 0;
            pickerLayoutValid = itemHeight > 0;
        }

        function updateScrollVisuals() {
            if (!pickerLayoutValid) {
                cachePickerLayout();
                if (!pickerLayoutValid) return;
            }
            const scrollY = picker.scrollTop;
            const halfH = itemHeight * 0.5;
            const len = pickerChildren.length;
            let centerIdx = 0;
            let minDiv = Infinity;

            for (let i = 0; i < len; i++) {
                // Equal-height items: derive offsetTop instead of triggering layout reads
                const dist = (pickerPaddingTop + i * itemHeight) - scrollY + halfH - pickerCenter;
                const absDist = dist < 0 ? -dist : dist;
                const norm = dist / itemHeight;
                const absNorm = norm < 0 ? -norm : norm;
                if (absDist < minDiv) { minDiv = absDist; centerIdx = i; }
                const li = pickerChildren[i];
                const scale = absNorm * 0.2; // 1 - scale → final
                li.style.transform = 'rotateX(' + (norm * -30) + 'deg) scale(' + (scale > 0.6 ? 0.4 : 1 - scale) + ') translateZ(0)';
                const op = 1 - absNorm * 0.6;
                li.style.opacity = op < 0.1 ? 0.1 : op;
            }

            if (centerIdx !== lastIndex) {
                if (navigator.vibrate) navigator.vibrate(10);
                lastIndex = centerIdx;
                selectedDurationMs = centerIdx === 0 ? 30000 : centerIdx * 60000;
                pickerUnitEl.textContent = centerIdx === 0 ? 'sec' : 'min';
            }
        }

        // Debounce: at most one rAF in flight per scroll burst
        let scrollPending = false;
        picker.addEventListener('scroll', () => {
            if (scrollPending) return;
            scrollPending = true;
            requestAnimationFrame(() => {
                scrollPending = false;
                updateScrollVisuals();
            });
        }, { passive: true });

        window.addEventListener('resize', () => { pickerLayoutValid = false; }, { passive: true });
        window.addEventListener('orientationchange', () => { pickerLayoutValid = false; }, { passive: true });

        let arrowScrolling = false;
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (s1El.classList.contains('active')) {
                    nav('s2');
                } else if (s2El.classList.contains('active')) {
                    startSession();
                }
                return;
            }

            if (!s2El.classList.contains('active')) return;

            if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                e.preventDefault();
                if (arrowScrolling) return;
                arrowScrolling = true;
                const dir = e.key === 'ArrowUp' ? -1 : 1;
                const mode = e.repeat ? 'instant' : 'smooth';
                picker.scrollBy({ top: dir * itemHeight, behavior: mode });
                setTimeout(() => { arrowScrolling = false; }, e.repeat ? 80 : 200);
            }
        });

        async function startSession() {
            nav('s34');
            isSessionActive = true;
            document.body.classList.add('in-session');
            streakBtnEl.style.display = 'none';
            quotesBtnEl.style.display = 'none';
            requestWakeLock();
            startWakeLockMonitor();

            mainCircle.style.transform = 'scale(0.4)';
            breatheText.style.opacity = '1';

            // Reset progress ring (no transition on the reset jump)
            progressFillEl.style.transition = 'none';
            progressFillEl.style.opacity = '1';
            progressFillEl.style.strokeDashoffset = PROGRESS_CIRCUMFERENCE;
            // Force reflow then re-enable the slow fill transition
            void progressFillEl.getBoundingClientRect();
            progressFillEl.style.transition = 'stroke-dashoffset 0.6s linear, opacity 0.8s ease';

            const start = performance.now();
            mainCircle.classList.add('animate-breathe');

            let textFaded = false;
            let lastBreatheText = '';
            let lastProgressUpdate = 0;
            function loop(now) {
                if (!isSessionActive || !s34El.classList.contains('active')) return;

                const elapsed = now - start;

                if (!textFaded && elapsed < 26000) {
                    const p = elapsed % 12000;
                    let target;
                    if (p < 4500) target = 'Inhale';
                    else if (p < 6000) target = 'Hold';
                    else if (p < 10500) target = 'Exhale';
                    else target = 'Hold';
                    if (target !== lastBreatheText) {
                        breatheText.textContent = target;
                        lastBreatheText = target;
                    }
                } else if (!textFaded) {
                    breatheText.style.opacity = '0';
                    textFaded = true;
                }

                // Progress ring — update at most twice per second to keep the linear
                // CSS transition smoothing the visual; saves needless DOM writes.
                if (now - lastProgressUpdate > 500) {
                    const progress = Math.min(1, elapsed / selectedDurationMs);
                    progressFillEl.style.strokeDashoffset = PROGRESS_CIRCUMFERENCE * (1 - progress);
                    lastProgressUpdate = now;
                }

                if (elapsed >= selectedDurationMs) endSession();
                else requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);
        }

        function endSession() {
            isSessionActive = false;
            document.body.classList.remove('in-session');
            stopWakeLockMonitor();
            releaseWakeLock();

            // Log the completed session
            const sessionMins = Math.max(1, Math.round(selectedDurationMs / 60000));
            logSession(sessionMins);
            updateStreakBtn();

            // Subtle haptic celebration on supported devices (no sound)
            if (navigator.vibrate) navigator.vibrate([40, 60, 40]);

            // Trap bounding container scale
            const transform = window.getComputedStyle(mainCircle).transform;
            mainCircle.classList.remove('animate-breathe');
            mainCircle.style.transform = transform;
            void mainCircle.offsetWidth; // Force Reflow

            // Complete the progress ring then fade it out
            progressFillEl.style.strokeDashoffset = 0;
            setTimeout(() => { progressFillEl.style.opacity = '0'; }, 600);

            // Shrink entire container and turn green
            mainCircle.style.transition = 'transform 1.2s ease, background-color 1.2s ease';
            mainCircle.style.transform = 'scale(0.5)';
            mainCircle.style.backgroundColor = 'var(--success)';

            breatheText.style.opacity = '0';
            checkSvgEl.classList.add('active');

            // Compose summary line: "+5m today · 3 day streak"
            const log = getSessionLog();
            const streak = calcStreak(log);
            const todayKey = dayKey(new Date());
            let mtoday = 0;
            for (let i = 0; i < log.length; i++) if (log[i].date === todayKey) mtoday += log[i].mins;
            const streakPart = streak > 0 ? streak + ' day streak' : 'first session today';
            s4SummaryEl.innerHTML = '<strong>+' + sessionMins + 'm</strong> today · ' + streakPart;

            s4UIEl.classList.add('active');
        }

        function resetToHome() { location.reload(); }

        // Initialize streak button count on load
        updateStreakBtn();

    </script>
