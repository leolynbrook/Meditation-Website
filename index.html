<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>ZenBreath</title>
    <style>
        :root {
            --bg: #000000;
            --fg: #FFFFFF;
            --success: #66BB6A;
            --success-soft: rgba(129, 199, 132, 0.7);

            /* Layered surfaces — keeps the dark UI consistent across platforms */
            --surface-1: rgba(255, 255, 255, 0.03);
            --surface-2: rgba(255, 255, 255, 0.06);
            --surface-3: rgba(255, 255, 255, 0.1);
            --hairline: rgba(255, 255, 255, 0.1);
            --hairline-strong: rgba(255, 255, 255, 0.22);

            /* Motion tokens — used to standardize transitions across desktop and mobile */
            --dur-fast: 0.15s;
            --dur-base: 0.25s;
            --dur-slow: 0.45s;
            --ease-fluid: cubic-bezier(0.4, 0, 0.2, 1);   /* Material standard */
            --ease-out-soft: cubic-bezier(0.25, 0.1, 0.25, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1); /* gentle overshoot */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            /* 100vh fallback for iOS Safari < 16 / older Android browsers,
               then 100dvh on engines that understand it (modern Safari, Chrome, Edge) */
            height: 100vh;
            height: 100dvh;
            min-height: -webkit-fill-available; /* iOS Safari belt-and-suspenders */
            background-color: var(--bg);
            color: var(--fg);
            /* System font stack covers macOS / iOS / Windows / Chromebook / Android */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
                Ubuntu, Cantarell, Helvetica, Arial, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
            -webkit-tap-highlight-color: transparent;
            /* Stop mobile browsers from auto-resizing text in landscape (iOS) or after rotation (Android) */
            -webkit-text-size-adjust: 100%;
            -moz-text-size-adjust: 100%;
            text-size-adjust: 100%;
            /* Crisp text on Retina (Mac/iOS), high-DPI Pixel/Samsung, and ClearType (Windows) */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            /* Prevent iOS pinch-zoom and Android double-tap-zoom on the meditation surface */
            touch-action: manipulation;
            /* Avoid Android pull-to-refresh on the body itself */
            overscroll-behavior: none;
        }

        /* Removes the 300ms tap delay on touch devices and disables long-press selection
           specifically for tappable controls. Body-level touch-action also prevents pinch zoom. */
        button,
        .audio-chip,
        .picker-overlay,
        .stat-card,
        .heatmap-cell {
            touch-action: manipulation;
            -webkit-touch-callout: none;
        }

        /* Focus rings: only show when navigating by keyboard (Chromebook / Windows / Mac power users),
           invisible on mouse click and touch tap. Provides accessibility without leaving sticky rings. */
        :focus {
            outline: none;
        }

        button:focus-visible,
        .audio-chip:focus-visible,
        .stat-card:focus-visible,
        .picker-overlay:focus-visible,
        .audio-slider:focus-visible {
            outline: 2px solid var(--success-soft);
            outline-offset: 3px;
            border-radius: inherit;
        }

        .audio-slider:focus-visible {
            outline-offset: 6px;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .screen.active {
            opacity: 1;
            pointer-events: all;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 200;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        h2 {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        .intention-text {
            font-size: 1.1rem;
            font-weight: 300;
            font-style: italic;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 3rem;
            text-align: center;
            max-width: 85%;
            min-height: 3rem;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .btn {
            background: var(--fg);
            color: var(--bg);
            border: none;
            border-radius: 4rem;
            padding: 1.2rem 3rem;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: auto;
            margin-bottom: 15vh;
            /* Baseline shadow + halo (zero-blur halo so the hover transition is smooth) */
            box-shadow:
                0 1px 0 rgba(0, 0, 0, 0.08),
                0 0 0 0 rgba(255, 255, 255, 0);
            transition:
                transform var(--dur-fast) var(--ease-fluid),
                box-shadow var(--dur-base) var(--ease-fluid),
                background-color var(--dur-base) var(--ease-fluid);
        }

        @media (hover: hover) and (pointer: fine) {
            .btn:hover {
                /* Lift + warm halo. Avoids the jarring black-to-grey flip the design used to do. */
                transform: translateY(-2px);
                box-shadow:
                    0 12px 28px rgba(255, 255, 255, 0.14),
                    0 0 0 1px rgba(255, 255, 255, 0.35);
                background-color: #f5f5f7;
            }
        }

        .btn:active {
            transform: translateY(0) scale(0.96);
            transition-duration: var(--dur-fast);
            box-shadow:
                0 2px 6px rgba(255, 255, 255, 0.08),
                0 0 0 1px rgba(255, 255, 255, 0.2);
        }

        /* Buttery 3D Scroll Picker */
        .picker-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 50vh;
            margin: 2rem 0;
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 40%, black 60%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 40%, black 60%, transparent 100%);
        }

        .picker {
            position: relative;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            padding-top: calc(25vh - 70px);
            padding-bottom: calc(25vh - 70px);
            perspective: 1000px;
            transform-style: preserve-3d;
        }

        .picker::-webkit-scrollbar {
            display: none;
        }

        .picker li {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.5rem;
            font-weight: 400;
            color: var(--fg);
            scroll-snap-align: center;
            will-change: transform, opacity;
        }

        .picker-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60%;
            height: 140px;
            pointer-events: all;
            cursor: pointer;
            border-top: 1px solid var(--hairline);
            border-bottom: 1px solid var(--hairline);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 1.5rem;
            border-radius: 0.5rem;
            transition:
                background-color var(--dur-base) var(--ease-fluid),
                border-color var(--dur-base) var(--ease-fluid);
        }

        @media (hover: hover) and (pointer: fine) {
            .picker-overlay:hover {
                background: rgba(255, 255, 255, 0.04);
                border-top-color: var(--hairline-strong);
                border-bottom-color: var(--hairline-strong);
            }
        }

        .picker-overlay:active {
            background: rgba(255, 255, 255, 0.08);
        }

        /* Holds the circle and the (fixed-size) progress ring around it */
        .circle-stage {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Progress ring sits behind the circle at its maximum scale boundary */
        .progress-ring {
            position: absolute;
            width: clamp(280px, 78vw, 540px);
            height: clamp(280px, 78vw, 540px);
            pointer-events: none;
            transform: rotate(-90deg);
        }

        .progress-track {
            fill: none;
            stroke: rgba(255, 255, 255, 0.06);
            stroke-width: 1.5;
        }

        .progress-fill {
            fill: none;
            stroke: rgba(255, 255, 255, 0.45);
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-dasharray: 603.19; /* 2*PI*96 */
            stroke-dashoffset: 603.19;
            transition: stroke-dashoffset 0.6s linear, opacity 0.8s ease;
        }

        /* Container scales rapidly (GPU Accelerated Breathing) */
        .circle {
            width: clamp(250px, 70vw, 500px);
            height: clamp(250px, 70vw, 500px);
            border-radius: 50%;
            background: var(--fg);
            will-change: transform;
            transform: scale(0.4);
            /* Start small for inhale */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes breatheCycle {
            0% {
                transform: scale(0.4);
            }

            /* Start & Hold Low */
            37.5% {
                transform: scale(1);
            }

            /* Inhale (4.5s) */
            50% {
                transform: scale(1);
            }

            /* Hold (1.5s) */
            87.5% {
                transform: scale(0.4);
            }

            /* Exhale (4.5s) */
            100% {
                transform: scale(0.4);
            }

            /* Hold (1.5s) */
        }

        .animate-breathe {
            animation: breatheCycle 12s infinite linear;
        }

        .breathe-text {
            position: absolute;
            z-index: 10;
            font-size: 2.5rem;
            font-weight: 300;
            color: var(--fg);
            mix-blend-mode: difference;
            transition: opacity 1.5s;
        }

        .check-svg {
            position: absolute;
            width: 40%;
            height: 40%;
            opacity: 0;
            transition: 0.5s 0.8s;
            z-index: 2;
        }

        .check-svg.active {
            opacity: 1;
        }

        .check-path {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
        }

        .check-svg.active .check-path {
            animation: drawCheck 0.6s 1s forwards ease;
        }

        @keyframes drawCheck {
            to {
                stroke-dashoffset: 0;
            }
        }

        .s4-ui {
            position: absolute;
            top: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 15vh 0 10vh 0;
            opacity: 0;
            pointer-events: none;
            transition: 0.8s 0.5s;
        }

        .s4-ui.active {
            opacity: 1;
            pointer-events: all;
        }

        .s4-summary {
            font-size: 1rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.55);
            letter-spacing: 0.04em;
            text-align: center;
            max-width: 85%;
            line-height: 1.5;
            opacity: 0;
            transition: opacity 1s ease 0.6s;
        }

        .s4-ui.active .s4-summary {
            opacity: 1;
        }

        .s4-summary strong {
            color: var(--success);
            font-weight: 500;
        }

        /* --- Quotes Button (top-left, all screens) --- */
        .quotes-btn {
            position: fixed;
            top: max(env(safe-area-inset-top, 12px), 12px);
            left: 16px;
            z-index: 100;
            background: rgba(0, 0, 0, 0);
            border: 1px solid var(--hairline);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            cursor: pointer;
            display: flex;
            align-items: center;
            box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
            transition:
                background-color var(--dur-base) var(--ease-fluid),
                color var(--dur-base) var(--ease-fluid),
                border-color var(--dur-base) var(--ease-fluid),
                transform var(--dur-fast) var(--ease-fluid),
                box-shadow var(--dur-base) var(--ease-fluid);
        }

        @media (hover: hover) and (pointer: fine) {
            .quotes-btn:hover {
                background: var(--surface-3);
                border-color: var(--hairline-strong);
                color: #fff;
                transform: scale(1.04);
                box-shadow: 0 4px 14px rgba(255, 255, 255, 0.06);
            }
        }

        .quotes-btn:active {
            transform: scale(0.94);
            transition-duration: var(--dur-fast);
        }

        /* --- Quotes Screen --- */
        .quotes-screen {
            overflow-y: auto;
            justify-content: flex-start;
            /* Bottom padding reserves space for the fixed audio-btn so the last quote isn't hidden under it */
            padding: 6vh 1.5rem calc(max(env(safe-area-inset-bottom, 18px), 18px) + 70px);
            z-index: 200;
            /* Fully obscure underlying screens */
            background-color: var(--bg);
            /* Smooth momentum scroll on iOS/older WebKit */
            -webkit-overflow-scrolling: touch;
            /* Prevent scroll chaining / pull-to-refresh interfering on mobile */
            overscroll-behavior-y: contain;
            /* Crisp text antialiasing on macOS/Chrome */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .quotes-feed {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 1.4rem;
            padding: 2vh 0 6vh;
        }

        .quotes-feed-item {
            font-size: clamp(1rem, 3.5vw, 1.2rem);
            font-weight: 300;
            font-style: italic;
            color: rgba(255, 255, 255, 0.75);
            line-height: 1.65;
            text-align: center;
            padding: 1rem 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            opacity: 0;
            /* Opacity-only fade-in: no transform → no compositor layer promotion,
               so subpixel font antialiasing stays sharp during and after scroll. */
            animation: quoteFadeIn 0.5s ease forwards;
        }

        .quotes-feed-item:last-child {
            border-bottom: none;
        }

        @keyframes quoteFadeIn {
            to {
                opacity: 1;
            }
        }

        /* --- Streak Button (top-right, all screens) --- */
        .streak-btn {
            position: fixed;
            top: max(env(safe-area-inset-top, 12px), 12px);
            right: 16px;
            z-index: 100;
            background: rgba(0, 0, 0, 0);
            border: 1px solid var(--hairline);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
            transition:
                background-color var(--dur-base) var(--ease-fluid),
                color var(--dur-base) var(--ease-fluid),
                border-color var(--dur-base) var(--ease-fluid),
                transform var(--dur-fast) var(--ease-fluid),
                box-shadow var(--dur-base) var(--ease-fluid);
        }

        @media (hover: hover) and (pointer: fine) {
            .streak-btn:hover {
                background: var(--surface-3);
                border-color: var(--hairline-strong);
                color: #fff;
                transform: scale(1.04);
                box-shadow: 0 4px 14px rgba(255, 255, 255, 0.06);
            }
        }

        .streak-btn:active {
            transform: scale(0.94);
            transition-duration: var(--dur-fast);
        }

        .streak-btn svg {
            width: 16px;
            height: 16px;
        }

        /* --- Streak Screen --- */
        .streak-screen {
            overflow-y: auto;
            justify-content: flex-start;
            /* Bottom padding reserves space for the fixed audio-btn so the heatmap legend isn't hidden under it */
            padding: 6vh 1.5rem calc(max(env(safe-area-inset-bottom, 18px), 18px) + 70px);
            z-index: 200;
            /* Fully obscure underlying screens */
            background-color: var(--bg);
            /* Smooth momentum scroll on iOS/older WebKit, prevent pull-to-refresh on Android */
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
        }

        .streak-back {
            position: absolute;
            top: max(env(safe-area-inset-top, 12px), 12px);
            left: 16px;
            background: rgba(0, 0, 0, 0);
            border: 1px solid var(--hairline);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
            transition:
                background-color var(--dur-base) var(--ease-fluid),
                color var(--dur-base) var(--ease-fluid),
                border-color var(--dur-base) var(--ease-fluid),
                transform var(--dur-fast) var(--ease-fluid),
                box-shadow var(--dur-base) var(--ease-fluid);
        }

        @media (hover: hover) and (pointer: fine) {
            .streak-back:hover {
                background: var(--surface-3);
                border-color: var(--hairline-strong);
                color: #fff;
                transform: scale(1.04) translateX(-1px);
                box-shadow: 0 4px 14px rgba(255, 255, 255, 0.06);
            }
        }

        .streak-back:active {
            transform: scale(0.94);
            transition-duration: var(--dur-fast);
        }

        .streak-quote {
            font-size: clamp(1.1rem, 4vw, 1.5rem);
            font-weight: 300;
            font-style: italic;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            max-width: 85%;
            margin: 5vh 0 3vh;
            line-height: 1.6;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .streak-quote.show {
            opacity: 1;
        }

        .streak-counter {
            text-align: center;
            margin: 2rem 0 1rem;
        }

        .streak-number {
            font-size: clamp(4rem, 15vw, 7rem);
            font-weight: 200;
            letter-spacing: -0.02em;
            line-height: 1;
            background: linear-gradient(135deg, #66BB6A, #81C784);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .streak-label {
            font-size: 1rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.45);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-top: 0.3rem;
        }

        /* --- Stats panel --- */
        .streak-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.6rem;
            width: 100%;
            max-width: 480px;
            margin: 1.4rem auto 0.5rem;
            padding: 0 0.5rem;
        }

        .stat-card {
            background: var(--surface-1);
            border: 1px solid var(--surface-2);
            border-radius: 0.85rem;
            padding: 0.85rem 0.5rem 0.7rem;
            text-align: center;
            /* Allow grid item to shrink below content width on small phones */
            min-width: 0;
            overflow: hidden;
            box-shadow: 0 0 0 0 rgba(0, 0, 0, 0);
            transition:
                background-color var(--dur-base) var(--ease-fluid),
                border-color var(--dur-base) var(--ease-fluid),
                transform var(--dur-base) var(--ease-fluid),
                box-shadow var(--dur-base) var(--ease-fluid);
        }

        .stat-value {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: clip;
        }

        @media (hover: hover) and (pointer: fine) {
            .stat-card:hover {
                background: var(--surface-2);
                border-color: var(--hairline);
                transform: translateY(-2px);
                box-shadow: 0 10px 24px rgba(0, 0, 0, 0.4);
            }
        }

        .stat-value {
            font-size: clamp(1.4rem, 5vw, 1.8rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.95);
            line-height: 1.1;
            letter-spacing: -0.01em;
        }

        .stat-label {
            font-size: 0.7rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-top: 0.3rem;
        }

        /* --- Bar Chart --- */
        .chart-section {
            width: 100%;
            max-width: 500px;
            margin: 3rem auto 2rem;
            overflow-x: auto;
            /* Allow sideways scrolling on tiny phones if needed */
        }

        .chart-title {
            font-size: 0.85rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 1.2rem;
        }

        .chart-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 4px;
            height: 160px;
            padding: 0 0.5rem;
            min-width: 320px;
            /* Prevent over-squishing on small widths */
        }

        .chart-bar-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            max-width: 36px;
        }

        .chart-bar {
            width: 100%;
            min-height: 3px;
            border-radius: 3px 3px 0 0;
            background: linear-gradient(180deg, #66BB6A, #388E3C);
            transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .chart-bar.empty {
            background: rgba(255, 255, 255, 0.06);
            min-height: 3px;
        }

        .chart-bar.today {
            background: linear-gradient(180deg, #81C784, #66BB6A);
            box-shadow: 0 0 8px rgba(102, 187, 106, 0.4);
        }

        .chart-day {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 6px;
            font-weight: 400;
        }

        .chart-day.today {
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
        }

        .chart-mins {
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 4px;
            min-height: 0.9rem;
        }

        /* --- Year Heatmap (GitHub-style) --- */
        .heatmap-section {
            width: 100%;
            max-width: 760px;
            margin: 2rem auto 1rem;
        }

        .heatmap-title {
            font-size: 0.85rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 1rem;
        }

        .heatmap-scroll {
            position: relative;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 0 0.5rem 0.4rem;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
            /* Mobile: keep horizontal pan inside this container — never hijack vertical scroll
               or trigger pull-to-refresh on Samsung/Chrome Android. */
            touch-action: pan-x;
            overscroll-behavior-x: contain;
            /* Edge fade hints that there's more to scroll. Mask is purely visual; cells under
               the fade remain interactable. Mask both sides since we auto-scroll to today. */
            -webkit-mask-image: linear-gradient(to right,
                transparent 0%, black 16px, black calc(100% - 16px), transparent 100%);
            mask-image: linear-gradient(to right,
                transparent 0%, black 16px, black calc(100% - 16px), transparent 100%);
        }

        .heatmap-scroll::-webkit-scrollbar {
            height: 4px;
        }

        .heatmap-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
        }

        .heatmap-inner {
            display: inline-block;
            min-width: 100%;
        }

        .heatmap-months {
            display: grid;
            grid-template-columns: repeat(53, 12px);
            gap: 3px;
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 4px;
            height: 0.9rem;
            padding-left: 22px;
        }

        .heatmap-months span {
            grid-row: 1;
            white-space: nowrap;
        }

        .heatmap-row {
            display: flex;
            gap: 3px;
        }

        .heatmap-daycol {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-size: 0.55rem;
            color: rgba(255, 255, 255, 0.35);
            margin-right: 4px;
            padding: 1px 0;
            width: 18px;
        }

        .heatmap-daycol span {
            height: 12px;
            line-height: 12px;
        }

        .heatmap-grid {
            display: grid;
            grid-template-rows: repeat(7, 12px);
            grid-auto-flow: column;
            grid-auto-columns: 12px;
            gap: 3px;
        }

        .heatmap-cell {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            background: var(--surface-1);
            transition:
                transform var(--dur-fast) var(--ease-fluid),
                filter var(--dur-fast) var(--ease-fluid);
        }

        @media (hover: hover) and (pointer: fine) {
            .heatmap-cell:not(.future):hover {
                transform: scale(1.5);
                filter: brightness(1.25);
                /* Keep it on top of neighbors during the scale */
                position: relative;
                z-index: 5;
            }
        }

        .heatmap-cell.future {
            background: transparent;
        }

        .heatmap-cell.l1 { background: #1c4a1e; }
        .heatmap-cell.l2 { background: #2d7d31; }
        .heatmap-cell.l3 { background: #4daf50; }
        .heatmap-cell.l4 { background: #81C784; }

        .heatmap-cell.today {
            outline: 1px solid rgba(255, 255, 255, 0.6);
            outline-offset: 1px;
        }

        .heatmap-legend {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 0.6rem;
        }

        .heatmap-legend .heatmap-cell {
            width: 10px;
            height: 10px;
        }

        /* --- Audio button + popover --- */
        /* Wrapper anchors the button to the bottom-center and hosts the
           absolute-positioned slide-to-mute rail to the button's left. */
        .audio-control {
            position: fixed;
            bottom: max(env(safe-area-inset-bottom, 18px), 18px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 250;
            display: flex;
            align-items: center;
        }

        .audio-btn {
            position: relative;
            /* Drag offset (set inline by JS during hold-to-mute), composed with
               hover/active transforms below via CSS var so they don't conflict. */
            --drag-x: 0px;
            transform: translateX(var(--drag-x));
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--hairline);
            border-radius: 2rem;
            padding: 0.5rem 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            /* Stabilize width so toggling labels (Sound → Birds → Brown) doesn't reflow */
            min-width: 110px;
            /* Stabilize height too, so the rail (also 38px) lines up flush
               when the button slides over it at the end of the drag. */
            min-height: 38px;
            justify-content: center;
            box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
            /* Suppress iOS long-press selection / callout — we own this gesture. */
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            touch-action: none;
            transition:
                background-color var(--dur-base) var(--ease-fluid),
                color var(--dur-base) var(--ease-fluid),
                border-color var(--dur-base) var(--ease-fluid),
                transform var(--dur-base) var(--ease-spring),
                box-shadow var(--dur-base) var(--ease-fluid),
                opacity var(--dur-base) var(--ease-fluid);
        }

        .audio-btn span {
            min-width: 40px;
            text-align: left;
        }

        @media (hover: hover) and (pointer: fine) {
            .audio-btn:hover {
                background: rgba(255, 255, 255, 0.08);
                border-color: var(--hairline-strong);
                color: #fff;
                transform: translateX(var(--drag-x)) translateY(-2px);
                box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
            }
        }

        .audio-btn:active {
            transform: translateX(var(--drag-x)) scale(0.94);
        }

        /* While dragging, the button must follow the finger 1-to-1 — strip the
           transform transition (snap-back springs in only after release). */
        .audio-control.dragging .audio-btn,
        .audio-control.dragging .audio-btn:hover,
        .audio-control.dragging .audio-btn:active {
            transform: translateX(var(--drag-x));
            transition:
                background-color var(--dur-base) var(--ease-fluid),
                color var(--dur-base) var(--ease-fluid),
                border-color var(--dur-base) var(--ease-fluid),
                box-shadow var(--dur-base) var(--ease-fluid),
                opacity var(--dur-base) var(--ease-fluid);
        }

        .audio-btn.on {
            color: #81C784;
            border-color: rgba(129, 199, 132, 0.5);
        }

        /* Past the mute threshold — the button signals commit-on-release */
        .audio-btn.armed {
            color: #ffb4b4;
            border-color: rgba(244, 67, 54, 0.55);
            background: rgba(244, 67, 54, 0.16);
        }

        .audio-btn svg {
            width: 14px;
            height: 14px;
        }

        /* Slide-to-mute rail — sits to the left of the button, hidden until
           the user starts a hold gesture, then expands in. */
        .audio-mute-track {
            position: absolute;
            top: 50%;
            right: calc(100% + 8px);
            /* Width and shape mirror the audio button so that, at full drag,
               the button slides exactly on top of the rail and they merge
               into a single pill — no part of the rail "hangs out" beyond
               the button's edge. */
            height: 38px;
            width: 110px;
            border-radius: 2rem;
            background: rgba(0, 0, 0, 0.42);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--hairline);
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-50%) translateX(14px) scale(0.92);
            transform-origin: 100% 50%;
            transition:
                opacity 0.22s var(--ease-fluid),
                transform 0.34s var(--ease-spring),
                background-color 0.2s var(--ease-fluid),
                border-color 0.2s var(--ease-fluid);
        }

        .audio-mute-track.active {
            opacity: 1;
            transform: translateY(-50%) translateX(0) scale(1);
        }

        .audio-mute-track-fill {
            position: absolute;
            inset: 0;
            background: linear-gradient(to right,
                rgba(244, 67, 54, 0.32) 0%,
                rgba(244, 67, 54, 0.08) 100%);
            transform: scaleX(var(--mute-progress, 0));
            transform-origin: 0% 50%;
            transition: transform 0.06s linear, opacity 0.18s var(--ease-fluid);
            opacity: 0.85;
            pointer-events: none;
        }

        .audio-mute-track-content {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 0.4rem;
            height: 100%;
            padding: 0 26px 0 14px;
            color: rgba(255, 255, 255, 0.55);
            font-size: 0.62rem;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            transition: color 0.18s var(--ease-fluid);
        }

        /* The label is anchored to the left, but the dragging button will cover
           the right portion of the rail. Fade the label out as drag progresses
           so the overlap reads as the button "consuming" the rail toward mute. */
        .audio-mute-track-content > span {
            transition: opacity 0.12s var(--ease-fluid);
            opacity: calc(1 - var(--mute-progress, 0) * 1.4);
            white-space: nowrap;
            overflow: hidden;
        }

        .audio-mute-track.armed .audio-mute-track-content {
            color: #ffd6d6;
        }

        .audio-mute-track.armed {
            border-color: rgba(244, 67, 54, 0.55);
            background: rgba(244, 67, 54, 0.18);
        }

        .audio-mute-track-icon {
            width: 13px;
            height: 13px;
            flex-shrink: 0;
        }

        /* Faint left-pointing chevron animates while the rail is shown,
           reinforcing the gesture direction. */
        .audio-mute-track-arrow {
            position: absolute;
            right: 10px;
            top: 50%;
            width: 10px;
            height: 10px;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.35);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.22s var(--ease-fluid) 0.05s;
        }

        .audio-mute-track.active .audio-mute-track-arrow {
            opacity: 1;
            animation: muteArrowNudge 1.2s ease-in-out infinite;
        }

        .audio-mute-track.armed .audio-mute-track-arrow {
            animation: none;
            opacity: 0;
        }

        @keyframes muteArrowNudge {
            0%, 100% { transform: translateY(-50%) translateX(0); }
            50% { transform: translateY(-50%) translateX(-4px); }
        }

        .audio-popover {
            position: fixed;
            bottom: calc(max(env(safe-area-inset-bottom, 18px), 18px) + 50px);
            left: 50%;
            z-index: 251;
            background: rgba(15, 15, 15, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 1rem;
            padding: 0.7rem 0.7rem 0.65rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            /* Always fit the viewport even on 320px-wide phones */
            max-width: min(360px, calc(100vw - 24px));
            opacity: 0;
            pointer-events: none;
            /* Closed state: tucked down, scaled in, blurred. Open springs upward
               and resolves the blur, anchoring the emergence below the popover. */
            transform: translateX(-50%) translateY(20px) scale(0.9);
            transform-origin: 50% calc(100% + 10px);
            filter: blur(6px);
            box-shadow:
                0 14px 40px rgba(0, 0, 0, 0.55),
                0 0 0 1px rgba(255, 255, 255, 0.03) inset;
            transition:
                opacity 0.22s var(--ease-fluid),
                transform 0.42s var(--ease-spring),
                filter 0.26s var(--ease-fluid),
                box-shadow 0.3s var(--ease-fluid);
        }

        .audio-popover.open {
            opacity: 1;
            pointer-events: all;
            transform: translateX(-50%) translateY(0) scale(1);
            filter: blur(0);
        }

        /* Children are kept invisible-then-revealed via a one-shot keyframe
           animation. Using @keyframes (not transitions) avoids fighting with
           the chip's existing hover/active transforms. */
        @keyframes popoverItemReveal {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .audio-popover.open .audio-volume {
            animation: popoverItemReveal 0.34s var(--ease-spring) 0.06s backwards;
        }

        .audio-popover.open .audio-chip {
            animation: popoverItemReveal 0.32s var(--ease-spring) backwards;
        }

        .audio-popover.open .audio-chip:nth-child(1) { animation-delay: 0.10s; }
        .audio-popover.open .audio-chip:nth-child(2) { animation-delay: 0.13s; }
        .audio-popover.open .audio-chip:nth-child(3) { animation-delay: 0.16s; }
        .audio-popover.open .audio-chip:nth-child(4) { animation-delay: 0.19s; }
        .audio-popover.open .audio-chip:nth-child(5) { animation-delay: 0.22s; }
        .audio-popover.open .audio-chip:nth-child(6) { animation-delay: 0.25s; }
        .audio-popover.open .audio-chip:nth-child(7) { animation-delay: 0.28s; }
        .audio-popover.open .audio-chip:nth-child(8) { animation-delay: 0.31s; }

        .audio-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
            justify-content: center;
        }

        .audio-volume {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.15rem 0.3rem 0.4rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .audio-volume-icon {
            width: 14px;
            height: 14px;
            color: rgba(255, 255, 255, 0.5);
            flex-shrink: 0;
        }

        .audio-slider {
            -webkit-appearance: none;
            appearance: none;
            flex: 1;
            height: 22px; /* tap area */
            background: transparent;
            cursor: pointer;
            outline: none;
        }

        /* Track + thumb (WebKit / Blink) */
        .audio-slider::-webkit-slider-runnable-track {
            height: 3px;
            background: linear-gradient(to right,
                rgba(129, 199, 132, 0.7) 0%,
                rgba(129, 199, 132, 0.7) var(--vol-pct, 50%),
                rgba(255, 255, 255, 0.12) var(--vol-pct, 50%),
                rgba(255, 255, 255, 0.12) 100%);
            border-radius: 2px;
        }

        .audio-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            margin-top: -6.5px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            transition:
                transform var(--dur-fast) var(--ease-fluid),
                box-shadow var(--dur-base) var(--ease-fluid);
        }

        @media (hover: hover) and (pointer: fine) {
            .audio-slider:hover::-webkit-slider-thumb {
                transform: scale(1.1);
                box-shadow:
                    0 2px 6px rgba(0, 0, 0, 0.5),
                    0 0 0 6px rgba(255, 255, 255, 0.08);
            }
        }

        .audio-slider:active::-webkit-slider-thumb {
            transform: scale(1.2);
            box-shadow:
                0 2px 6px rgba(0, 0, 0, 0.5),
                0 0 0 8px rgba(255, 255, 255, 0.12);
        }

        .audio-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            border: none;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            transition:
                transform var(--dur-fast) var(--ease-fluid),
                box-shadow var(--dur-base) var(--ease-fluid);
        }

        @media (hover: hover) and (pointer: fine) {
            .audio-slider:hover::-moz-range-thumb {
                transform: scale(1.1);
                box-shadow:
                    0 2px 6px rgba(0, 0, 0, 0.5),
                    0 0 0 6px rgba(255, 255, 255, 0.08);
            }
        }

        /* Track + thumb (Firefox) */
        .audio-slider::-moz-range-track {
            height: 3px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 2px;
            border: none;
        }

        .audio-slider::-moz-range-progress {
            height: 3px;
            background: rgba(129, 199, 132, 0.7);
            border-radius: 2px;
        }

        /* Solid fallback for browsers / devices without backdrop-filter
           (older Samsung Internet, older Pixel Chrome on low-RAM devices) */
        @supports not ((backdrop-filter: blur(8px)) or (-webkit-backdrop-filter: blur(8px))) {
            .audio-btn {
                background: rgba(20, 20, 20, 0.92);
            }
            .audio-popover {
                background: rgba(12, 12, 12, 0.97);
            }
            .audio-mute-track {
                background: rgba(20, 20, 20, 0.92);
            }
        }

        .audio-chip {
            background: var(--surface-1);
            border: 1px solid var(--hairline);
            border-radius: 1.5rem;
            padding: 0.45rem 0.9rem;
            color: rgba(255, 255, 255, 0.75);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            box-shadow: 0 0 0 0 rgba(0, 0, 0, 0);
            transition:
                background-color var(--dur-fast) var(--ease-fluid),
                border-color var(--dur-fast) var(--ease-fluid),
                color var(--dur-fast) var(--ease-fluid),
                transform var(--dur-fast) var(--ease-fluid),
                box-shadow var(--dur-fast) var(--ease-fluid);
        }

        @media (hover: hover) and (pointer: fine) {
            .audio-chip:hover {
                background: var(--surface-3);
                color: #fff;
                border-color: var(--hairline-strong);
                transform: translateY(-1px);
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
            }
        }

        .audio-chip.active {
            background: rgba(129, 199, 132, 0.2);
            border-color: rgba(129, 199, 132, 0.6);
            color: #81C784;
            box-shadow: 0 0 0 1px rgba(129, 199, 132, 0.3) inset;
        }

        @media (hover: hover) and (pointer: fine) {
            .audio-chip.active:hover {
                background: rgba(129, 199, 132, 0.28);
                border-color: rgba(129, 199, 132, 0.8);
                color: #81C784;
                box-shadow:
                    0 4px 14px rgba(102, 187, 106, 0.18),
                    0 0 0 1px rgba(129, 199, 132, 0.45) inset;
            }
        }

        /* ===== TABLET / IPAD ===== */
        /* Portrait: every iPad (744-1024 wide) plus larger Android tablets.
           Mobile-portrait (max-width: 600) takes over below this range. */
        @media screen and (orientation: portrait) and (min-width: 601px) and (max-width: 1024px) {
            h1 {
                font-size: clamp(3rem, 9vw, 4rem);
                margin-bottom: 1.2rem;
            }

            h2 {
                font-size: clamp(2rem, 6.5vw, 2.8rem);
            }

            .intention-text {
                font-size: 1.2rem;
                max-width: 80%;
                margin-bottom: 1.6rem;
            }

            /* Pull the home title down so the screen isn't a giant void
               between the title and the Begin button. */
            #s1 h1 { margin-top: 14vh !important; }
            #s2 h2 { margin-top: 6vh !important; }

            .picker-wrapper {
                height: 42vh;
                max-width: 460px;
                margin: 1.4rem 0;
            }

            .picker {
                padding-top: calc(21vh - 65px);
                padding-bottom: calc(21vh - 65px);
            }

            .picker li {
                height: 130px;
                font-size: 4rem;
            }

            .picker-overlay {
                height: 130px;
                width: 50%;
            }

            .circle {
                width: clamp(280px, 60vw, 420px);
                height: clamp(280px, 60vw, 420px);
            }

            .progress-ring {
                width: clamp(310px, 66vw, 470px);
                height: clamp(310px, 66vw, 470px);
            }

            .breathe-text {
                font-size: 2rem;
            }

            .btn {
                padding: 1.1rem 2.4rem;
                font-size: 1.1rem;
                margin-bottom: max(7vh, 80px);
                min-height: 56px;
            }

            /* Streak panel — roomier than mobile, tighter than the desktop
               default so the year heatmap doesn't get cropped or scroll. */
            .streak-screen {
                padding: 5vh 2rem calc(max(env(safe-area-inset-bottom, 18px), 18px) + 80px);
            }
            .streak-quote {
                font-size: 1.15rem;
                max-width: 72%;
                margin: 3vh 0 2vh;
            }
            .streak-counter { margin: 1rem 0 0.5rem; }
            .streak-number { font-size: clamp(4rem, 11vw, 5.5rem); }
            .streak-stats { max-width: 540px; }
            .stat-value { font-size: clamp(1.4rem, 4vw, 1.7rem); }
            .chart-section { margin: 2rem auto 1.5rem; max-width: 540px; }
            .chart-container { height: 140px; }
            .heatmap-section { margin: 2rem auto 1rem; }

            /* Quotes feed — generous breathing room for tap-to-scroll */
            .quotes-feed-item { font-size: 1.1rem; }
        }

        /* Landscape tablets — iPad Mini (1133×744), iPad (1180×820),
           iPad Pro 11" (1194×834), iPad Pro 12.9" (1366×1024).
           Also catches small 13" laptops; the touch-friendly sizing
           reads fine there. The previous rule used max-width: 1024px
           which never matched any iPad in landscape — that was the
           main reason iPads dropped to the desktop layout. */
        @media screen and (orientation: landscape) and (min-width: 768px) and (max-width: 1366px) and (max-height: 1100px) {
            h1 {
                font-size: clamp(2.4rem, 6vw, 3.4rem);
                margin-bottom: 0.8rem;
            }

            h2 {
                font-size: clamp(1.6rem, 4.2vw, 2.4rem);
            }

            .intention-text {
                font-size: 1.05rem;
                max-width: 70%;
                margin-bottom: 1.4rem;
            }

            #s1 h1 { margin-top: 10vh !important; }
            #s2 h2 { margin-top: 3vh !important; }

            .picker-wrapper {
                height: 50vh;
                max-width: 420px;
                margin: 0.6rem 0;
            }

            .picker {
                padding-top: calc(25vh - 60px);
                padding-bottom: calc(25vh - 60px);
            }

            .picker li {
                height: 120px;
                font-size: 3.4rem;
            }

            .picker-overlay {
                height: 120px;
                width: 50%;
            }

            /* Circle keyed off viewport HEIGHT so it scales to short
               iPad heights without dominating the screen. */
            .circle {
                width: clamp(220px, 38vh, 320px);
                height: clamp(220px, 38vh, 320px);
            }

            .progress-ring {
                width: clamp(250px, 44vh, 370px);
                height: clamp(250px, 44vh, 370px);
            }

            .breathe-text {
                font-size: 1.8rem;
            }

            .btn {
                padding: 0.9rem 2rem;
                font-size: 1.05rem;
                /* Must clear the fixed audio button at the bottom-center
                   (~56px including its safe-area inset). Set the floor at
                   70px so iPad mini landscape never collides. */
                margin-bottom: max(6vh, 70px);
                min-height: 50px;
            }

            /* Streak — has to fit under 744px on iPad mini landscape.
               Every margin and font-size below is shaved from the

            .streak-screen {

    <script>
        const picker = document.getElementById('picker');
        const mainCircle = document.getElementById('mainCircle');
        const breatheText = document.getElementById('breatheText');
        const pickerUnitEl = document.getElementById('pickerUnit');
        const streakBtnEl = document.getElementById('streakBtn');
        const quotesBtnEl = document.getElementById('quotesBtn');
        const streakBtnLabelEl = document.getElementById('streakBtnLabel');
        const s1El = document.getElementById('s1');
        const s2El = document.getElementById('s2');
        const s34El = document.getElementById('s34');
        const checkSvgEl = document.getElementById('checkSvg');
        const s4UIEl = document.getElementById('s4UI');
        const progressFillEl = document.getElementById('progressFill');
        const s4SummaryEl = document.getElementById('s4Summary');
        const PROGRESS_CIRCUMFERENCE = 603.19; // 2 * PI * 96, kept in sync with the SVG radius
        const quotesScreenEl = document.getElementById('quotesScreen');
        const streakScreenEl = document.getElementById('streakScreen');
        const screenEls = document.querySelectorAll('.screen');

        let selectedDurationMs = 60000;
        let isSessionActive = false;
        let itemHeight = 0;
        let lastIndex = -1;
        let wakeLock = null;
        let wakeLockRequesting = false;
        let wakeLockMonitor = null;

        /* Acquire the screen wake lock so the device doesn't auto-lock during
           a session. The OS can revoke the lock at any time (page hidden,
           battery saver, iOS Low Power Mode, some Android OEMs randomly), so
           we listen for the 'release' event AND poll on an interval — neither
           alone is sufficient in the wild. */
        async function requestWakeLock() {
            if (!('wakeLock' in navigator)) return;
            if (!isSessionActive) return;
            if (document.visibilityState !== 'visible') return; // request fails if hidden
            if (wakeLock !== null || wakeLockRequesting) return; // dedupe parallel callers
            wakeLockRequesting = true;
            try {

            const days = Object.keys(minsByDate).sort();
            let longest = 1, current = 1;
            for (let i = 1; i < days.length; i++) {
                const cur = new Date(days[i] + 'T00:00:00');
                const prev = new Date(days[i - 1] + 'T00:00:00');
                const diff = Math.round((cur - prev) / 86400000);
                if (diff === 1) {
                    current++;
                    if (current > longest) longest = current;
                } else {
                    current = 1;
                }
            }
            stats.longest = longest;
            return stats;
        }

        function pickKRandomIndices(total, k) {
            if (k >= total) {
                const all = new Array(total);
                for (let i = 0; i < total; i++) all[i] = i;
                // Fisher-Yates
                for (let i = total - 1; i > 0; i--) {
                    const j = (Math.random() * (i + 1)) | 0;
                    const tmp = all[i]; all[i] = all[j]; all[j] = tmp;
                }
                return all;
            }
            const result = new Array(k);
            const seen = new Set();
            let n = 0;
            while (n < k) {
                const i = (Math.random() * total) | 0;
                if (!seen.has(i)) {
                    seen.add(i);
                    result[n++] = i;
                }
            }
            return result;
        }

        let audioCtx = null;
